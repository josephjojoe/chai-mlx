name: tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-suite:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,esm]"

      - name: Validate environment
        run: python -m pip check

      - name: Run default test suite
        run: python -m pytest -q

  default-install:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distribution artifacts
        run: python -m build --sdist --wheel

      - name: Locate built wheel
        id: wheel
        shell: bash
        run: |
          # Heredoc body must start at column 0; heredocs preserve indentation
          # literally and Python rejects an indented top-level statement.
          wheel_path="$(python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel in dist/, found: {wheels}")
          print(wheels[0].resolve())
          PY
          )"
          echo "path=$wheel_path" >> "$GITHUB_OUTPUT"

      - name: Smoke install built wheel
        shell: bash
        env:
          WHEEL_PATH: ${{ steps.wheel.outputs.path }}
        run: |
          smoke_dir="$(mktemp -d)"
          python -m venv "$smoke_dir/venv"
          "$smoke_dir/venv/bin/pip" install --upgrade pip
          "$smoke_dir/venv/bin/pip" install "$WHEEL_PATH"
          "$smoke_dir/venv/bin/python" -m pip check

          # Run outside the repo root so local sources cannot shadow the wheel.
          cd "$smoke_dir"
          "$smoke_dir/venv/bin/python" - <<'PY'
          import chai_lab.chai1
          from chai_mlx import ChaiMLX, featurize_fasta
          print("artifact install smoke ok")
          PY
          "$smoke_dir/venv/bin/chai-mlx-infer" --help >/dev/null

name: tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-suite:
    runs-on: macos-14-arm64
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Validate environment
        run: python -m pip check

      - name: Run default test suite
        run: python -m pytest -q

  default-install:
    runs-on: macos-14-arm64
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install default package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Smoke import installed default stack
        run: |
          python - <<'PY'
          import chai_lab.chai1
          from chai_mlx import ChaiMLX, featurize_fasta
          print("default install smoke ok")
          PY
          chai-mlx-infer --help >/dev/null
